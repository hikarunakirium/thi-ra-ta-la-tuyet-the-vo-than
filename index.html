<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trình Đọc EPUB</title>
    <link rel="stylesheet" href="style.css">
</head>
<body data-theme="light">
    <div id="overlay" onclick="closeAllPanels()"></div>
    
    <aside id="sidebar">
        <div class="sidebar-header">
            <h3 style="margin:0;">Mục lục</h3>
            <button class="icon-btn" onclick="toggleSidebar()">✕</button>
        </div>
        <div style="padding: 10px; font-weight: bold; background: var(--bg); font-size: 12px; color: var(--primary);">🔖 BOOKMARK CỦA BẠN</div>
        <div id="bookmark-list" style="max-height: 25vh; overflow-y: auto; padding: 5px 10px; border-bottom: 2px solid var(--border);"></div>
        
        <div style="padding: 10px; font-weight: bold; background: var(--bg); font-size: 12px; color: var(--primary);">📖 DANH SÁCH CHƯƠNG</div>
        <div id="chapter-list" class="chapter-list"></div>
    </aside>

    <aside id="settings-panel">
        <div class="sidebar-header">
            <h3 style="margin:0;">Cài đặt</h3>
            <button class="icon-btn" onclick="toggleSettings()">✕</button>
        </div>
        <div class="settings-content">
            <div class="setting-group">
                <label>Phông chữ</label>
                <select id="fontFamily" onchange="applySettings()">
                    <option value="'Times New Roman', serif">Times New Roman</option>
                    <option value="'Segoe UI', Tahoma, sans-serif">Segoe UI</option>
                    <option value="'Palatino Linotype', serif">Palatino</option>
                    <option value="Arial, sans-serif">Arial</option>
                </select>
            </div>
            <div class="setting-group">
                <label>Cỡ chữ (<span id="fontSizeVal">21</span>px)</label>
                <input type="range" id="fontSize" min="14" max="36" value="21" oninput="applySettings()">
            </div>
            <div class="setting-group">
                <label>Khoảng cách dòng (<span id="lineHeightVal">1.8</span>)</label>
                <input type="range" id="lineHeight" min="1.2" max="2.5" step="0.1" value="1.8" oninput="applySettings()">
            </div>
            
            <div class="setting-group" style="margin-top: 30px; padding-top: 20px; border-top: 1px dashed var(--border);">
                <label>💾 Sao lưu & Phục hồi</label>
                <p style="font-size:12px; color:gray; margin-top:0;">Lưu tiến trình đọc và bookmark thành file.</p>
                <div style="display: flex; gap: 10px;">
                    <button style="flex:1;" onclick="exportData()">📤 Xuất</button>
                    <button style="flex:1;" onclick="document.getElementById('importFile').click()">📥 Nhập</button>
                    <input type="file" id="importFile" accept=".json" style="display:none;" onchange="importData(event)">
                </div>
            </div>
        </div>
    </aside>

    <main id="main-view">
        <div class="top-bar">
            <button class="menu-btn" onclick="toggleSidebar()">☰ Chương</button>
            <div class="nav-group">
                <button class="icon-btn" onclick="document.getElementById('epubInput').click()" title="Mở sách khác">📂 Mở file</button>
                <button class="icon-btn" onclick="addBookmark()" title="Lưu chương đang đọc">🔖 Đánh dấu</button>
                <button class="icon-btn" onclick="toggleSettings()" title="Tùy chỉnh font chữ">⚙️</button>
                <button class="theme-btn" onclick="toggleTheme()" title="Đổi màu nền">🌓</button>
            </div>
        </div>
        
        <div id="content-area">
            <div id="upload-screen">
                <h2 style="color: var(--primary); margin-bottom: 20px;">📚 Mở Sách EPUB</h2>
                <button class="upload-btn" onclick="document.getElementById('epubInput').click()">📁 Chọn File Từ Thiết Bị</button>
                <input type="file" id="epubInput" accept=".epub" style="display:none;" onchange="handleFileUpload(event)">
                <p style="color: gray; font-size: 14px; margin-top: 15px; text-align: center; max-width: 80%;">
                    Tiến trình đọc sẽ được tự động lưu lại.<br>Mở lại trang web, hãy chọn file sách cũ để đọc tiếp.
                </p>
            </div>
            <div id="reader-container"></div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
